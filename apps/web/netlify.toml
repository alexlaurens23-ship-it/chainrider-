# Netlify build + hosting for the CHAINRIDER web client.
# The API runs on Railway at the URL below; if it ever changes, update both the
# proxy `to` line and redeploy.
# The client calls a RELATIVE /api base (see src/net.ts), so this proxy makes the
# Netlify origin forward /api/* to the Railway API with no CORS dance.

[build]
  command = "npm run build -w @chainrider/web"
  publish = "apps/web/dist"

# Proxy API calls to Railway (status 200 = transparent reverse proxy, not a 30x).
[[redirects]]
  from = "/api/*"
  to = "https://chainriderapi-production.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA fallback: every other path serves the hash-routed index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

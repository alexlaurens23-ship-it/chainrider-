<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHAINRIDER</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #05060a;
        color: #e0ffff;
        font-family: monospace;
      }
      body.no-scroll {
        height: 100%;
        overflow: hidden;
      }
      #app {
        min-height: 100vh;
      }
      .game-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }

      /* ── Shared HUD / playground (unchanged) ───────────────────────────── */
      .hud {
        position: fixed;
        top: 12px;
        left: 12px;
        color: rgba(224, 255, 255, 0.85);
        font-size: 13px;
        line-height: 1.5;
        white-space: pre;
        pointer-events: none;
        text-shadow: 0 0 4px #000;
        z-index: 5;
      }
      .hud-status {
        position: fixed;
        top: 18%;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 42px;
        font-weight: bold;
        pointer-events: none;
        text-shadow: 0 0 12px #000;
        z-index: 5;
      }
      .panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 300px;
        overflow-y: auto;
        background: rgba(5, 6, 10, 0.88);
        border-left: 1px solid rgba(0, 229, 255, 0.25);
        color: #e0ffff;
        font-size: 11px;
        padding: 10px;
        box-sizing: border-box;
        z-index: 6;
      }
      .panel-title {
        font-size: 13px;
        letter-spacing: 2px;
        color: #00e5ff;
        margin-bottom: 8px;
      }
      .panel-row {
        display: grid;
        grid-template-columns: 110px 1fr 44px;
        gap: 6px;
        align-items: center;
        margin-bottom: 4px;
      }
      .panel-row input[type="range"] {
        width: 100%;
        accent-color: #00e5ff;
      }
      .panel-value {
        text-align: right;
        color: #ffb000;
      }
      .panel button,
      .selftest-btn {
        margin-top: 8px;
        background: #0a1420;
        color: #00e5ff;
        border: 1px solid #00e5ff;
        font-family: monospace;
        font-size: 12px;
        padding: 6px 10px;
        cursor: pointer;
      }
      .selftest-btn {
        position: fixed;
        bottom: 14px;
        left: 12px;
        z-index: 6;
      }
      .selftest-overlay {
        position: fixed;
        top: 8%;
        left: 0;
        right: 300px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        white-space: pre;
        pointer-events: none;
        text-shadow: 0 0 10px #000;
        z-index: 5;
      }
      .selftest-overlay:empty {
        display: none;
      }
      .selftest-overlay.recording {
        color: #ffb000;
      }
      .selftest-overlay.pass {
        color: #00ff88;
        font-size: 26px;
      }
      .selftest-overlay.fail {
        color: #ff3c3c;
        font-size: 26px;
      }

      /* ── Pages (home, map detail) ──────────────────────────────────────── */
      .page {
        max-width: 1080px;
        margin: 0 auto;
        padding: 28px 24px 64px;
        box-sizing: border-box;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .topnav {
        display: flex;
        align-items: center;
        gap: 16px;
        font-size: 12px;
        letter-spacing: 2px;
        color: #5b7184;
        margin-bottom: 28px;
      }
      .topnav a:hover {
        color: #00e5ff;
      }
      .hero-title {
        font-size: 52px;
        font-weight: bold;
        letter-spacing: 6px;
        color: #00e5ff;
        text-shadow: 0 0 18px rgba(0, 229, 255, 0.5);
        margin: 0;
      }
      .hero-tagline {
        color: #9fb4c8;
        font-size: 14px;
        margin: 8px 0 20px;
      }
      .stat-strip {
        display: flex;
        gap: 28px;
        padding: 14px 18px;
        border: 1px solid rgba(0, 229, 255, 0.2);
        border-radius: 8px;
        background: rgba(0, 229, 255, 0.04);
        margin-bottom: 16px;
      }
      .stat-strip .stat-num {
        color: #ffb000;
        font-size: 22px;
        font-weight: bold;
      }
      .stat-strip .stat-label {
        color: #9fb4c8;
        font-size: 11px;
        letter-spacing: 1px;
      }
      .countdown {
        display: flex;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 28px;
        color: #9fb4c8;
        font-size: 13px;
      }
      .countdown .cd-time {
        font-size: 30px;
        font-weight: bold;
        color: #00ff88;
        text-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
      }
      .section-title {
        font-size: 13px;
        letter-spacing: 3px;
        color: #5b7184;
        margin: 24px 0 14px;
      }
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }
      .track-card {
        border: 1px solid rgba(0, 229, 255, 0.18);
        border-radius: 10px;
        background: rgba(10, 20, 32, 0.6);
        padding: 14px;
        cursor: pointer;
        transition: border-color 0.15s, transform 0.15s;
      }
      .track-card:hover {
        border-color: #00e5ff;
        transform: translateY(-2px);
      }
      .track-card .card-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .track-card .symbol {
        font-size: 20px;
        font-weight: bold;
        color: #e0ffff;
      }
      .track-card .name {
        color: #9fb4c8;
        font-size: 11px;
      }
      .track-card .spark {
        width: 100%;
        height: 48px;
        display: block;
        margin: 6px 0 10px;
      }
      .track-card .card-bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 12px;
      }
      .track-card .prize {
        color: #ffb000;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        font-weight: bold;
        color: #05060a;
      }
      .period-pill {
        font-size: 10px;
        letter-spacing: 1px;
        color: #5b7184;
        border: 1px solid rgba(91, 113, 132, 0.4);
        border-radius: 8px;
        padding: 1px 7px;
      }
      .card-link {
        display: block;
        color: inherit;
      }
      .tier-chips {
        display: flex;
        gap: 6px;
        margin-top: 4px;
      }
      .tier-chip {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        padding: 6px 4px;
        border-radius: 8px;
        color: #05060a;
        cursor: pointer;
        transition: transform 0.12s, filter 0.12s;
      }
      .tier-chip:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
      }
      .tier-chip .tc-name {
        font-size: 10px;
        font-weight: bold;
        letter-spacing: 1px;
      }
      .tier-chip .tc-prize {
        font-size: 11px;
        font-weight: bold;
      }
      .tier-chip.degen {
        box-shadow: 0 0 12px rgba(255, 60, 90, 0.55);
      }
      .badge.degen {
        box-shadow: 0 0 10px rgba(255, 60, 90, 0.6);
      }
      .badge.savage {
        box-shadow: 0 0 12px rgba(226, 59, 255, 0.7);
      }

      /* ── Map detail ────────────────────────────────────────────────────── */
      .control-label {
        font-size: 10px;
        letter-spacing: 2px;
        color: #5b7184;
        margin-top: 14px;
      }
      .tier-toggle {
        display: flex;
        gap: 8px;
        margin: 6px 0 2px;
      }
      .tier-btn {
        flex: 1;
        max-width: 160px;
        background: #0a1420;
        color: #9fb4c8;
        border: 1px solid rgba(0, 229, 255, 0.25);
        border-radius: 6px;
        font-family: monospace;
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 1px;
        padding: 9px 14px;
        cursor: pointer;
        transition: filter 0.12s;
      }
      .tier-btn:hover {
        filter: brightness(1.15);
      }
      .tier-btn.active {
        border-color: transparent;
      }
      .tier-btn.degen.active {
        box-shadow: 0 0 14px rgba(255, 60, 90, 0.6);
      }
      .tier-btn.savage.active {
        box-shadow: 0 0 16px rgba(226, 59, 255, 0.7);
      }
      .tabs,
      .mode-toggle {
        display: flex;
        gap: 8px;
        margin: 14px 0;
      }
      .tab,
      .mode-btn {
        background: #0a1420;
        color: #9fb4c8;
        border: 1px solid rgba(0, 229, 255, 0.25);
        border-radius: 6px;
        font-family: monospace;
        font-size: 12px;
        padding: 6px 14px;
        cursor: pointer;
      }
      .tab.active,
      .mode-btn.active {
        color: #05060a;
        background: #00e5ff;
        border-color: #00e5ff;
        font-weight: bold;
      }
      .tab:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .chart-preview {
        width: 100%;
        height: 320px;
        display: block;
        border: 1px solid rgba(0, 229, 255, 0.15);
        border-radius: 10px;
        background: #070a10;
        margin: 8px 0 18px;
      }
      .stats-row {
        display: flex;
        flex-wrap: wrap;
        gap: 22px;
        padding: 14px 18px;
        border: 1px solid rgba(0, 229, 255, 0.15);
        border-radius: 8px;
        margin-bottom: 20px;
      }
      .stats-row .stat-num {
        font-size: 18px;
        font-weight: bold;
        color: #e0ffff;
      }
      .stats-row .stat-label {
        font-size: 10px;
        letter-spacing: 1px;
        color: #5b7184;
      }
      .ladder {
        color: #ffb000;
        font-size: 13px;
      }
      .leaderboard {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 24px;
        font-size: 13px;
      }
      .leaderboard th {
        text-align: left;
        color: #5b7184;
        font-weight: normal;
        letter-spacing: 1px;
        border-bottom: 1px solid rgba(91, 113, 132, 0.3);
        padding: 6px 10px;
      }
      .leaderboard td {
        padding: 6px 10px;
        border-bottom: 1px solid rgba(91, 113, 132, 0.12);
      }
      .empty-state {
        color: #5b7184;
        padding: 18px;
        text-align: center;
        border: 1px dashed rgba(91, 113, 132, 0.3);
        border-radius: 8px;
        margin-bottom: 24px;
      }
      .btn-primary {
        display: inline-block;
        background: linear-gradient(180deg, #00e5ff, #00a6bd);
        color: #05060a;
        font-family: monospace;
        font-weight: bold;
        font-size: 16px;
        letter-spacing: 2px;
        padding: 14px 28px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        box-shadow: 0 0 18px rgba(0, 229, 255, 0.4);
      }
      .btn-primary:hover {
        filter: brightness(1.1);
      }
      .btn-secondary {
        background: #0a1420;
        color: #00e5ff;
        border: 1px solid #00e5ff;
        font-family: monospace;
        font-size: 14px;
        padding: 12px 22px;
        border-radius: 8px;
        cursor: pointer;
      }
      .btn-secondary:hover {
        background: #0e1c2c;
      }

      /* ── Ride HUD ───────────────────────────────────────────────────────── */
      .ride-hud-tl {
        position: fixed;
        top: 14px;
        left: 16px;
        z-index: 5;
        pointer-events: none;
        text-shadow: 0 0 6px #000;
      }
      .ride-hud-tl .track-name {
        font-size: 13px;
        letter-spacing: 2px;
        color: #9fb4c8;
      }
      .ride-hud-tl .score {
        font-size: 34px;
        font-weight: bold;
        color: #e0ffff;
      }
      .ride-hud-tl .combo {
        font-size: 18px;
        color: #ffb000;
      }
      .ride-hud-tl .air {
        font-size: 14px;
        color: #7df9ff;
        min-height: 16px;
      }
      .ride-hud-tc {
        position: fixed;
        top: 14px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 26px;
        font-weight: bold;
        color: #e0ffff;
        z-index: 5;
        pointer-events: none;
        text-shadow: 0 0 8px #000;
      }
      .ride-minimap {
        position: fixed;
        top: 14px;
        right: 16px;
        z-index: 5;
        border: 1px solid rgba(0, 229, 255, 0.25);
        border-radius: 6px;
        background: rgba(5, 6, 10, 0.6);
      }
      .ride-legend {
        position: fixed;
        bottom: 14px;
        right: 16px;
        z-index: 5;
        font-size: 11px;
        color: #5b7184;
        text-align: right;
        pointer-events: none;
        line-height: 1.6;
      }
      .ride-legend b {
        color: #9fb4c8;
        font-weight: normal;
      }

      /* ── Run complete card ─────────────────────────────────────────────── */
      .run-complete {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(5, 6, 10, 0.78);
        backdrop-filter: blur(3px);
      }
      .run-card {
        width: 420px;
        max-width: 92vw;
        border: 1px solid rgba(0, 229, 255, 0.35);
        border-radius: 14px;
        background: #080c14;
        padding: 26px 28px;
        text-align: center;
        box-shadow: 0 0 40px rgba(0, 229, 255, 0.2);
      }
      .run-card .rc-head {
        font-size: 13px;
        letter-spacing: 3px;
        color: #5b7184;
      }
      .run-card .rc-score {
        font-size: 54px;
        font-weight: bold;
        color: #00e5ff;
        text-shadow: 0 0 16px rgba(0, 229, 255, 0.5);
        margin: 4px 0;
      }
      .run-card .stars {
        font-size: 30px;
        letter-spacing: 4px;
        margin-bottom: 8px;
      }
      .run-card .rc-breakdown {
        font-size: 12px;
        color: #9fb4c8;
        margin-bottom: 16px;
      }
      .run-card .stars .on {
        color: #ffb000;
        text-shadow: 0 0 10px rgba(255, 176, 0, 0.5);
      }
      .run-card .stars .off {
        color: #2a3848;
      }
      .rc-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 18px;
        margin-bottom: 22px;
        text-align: left;
      }
      .rc-grid .cell {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid rgba(91, 113, 132, 0.15);
        padding-bottom: 4px;
        font-size: 13px;
      }
      .rc-grid .cell .k {
        color: #5b7184;
      }
      .rc-grid .cell .v {
        color: #e0ffff;
        font-weight: bold;
      }
      .rc-status {
        font-size: 12px;
        letter-spacing: 1px;
        color: #9fb4c8;
        margin-bottom: 14px;
        min-height: 16px;
      }
      .rc-status.ok {
        color: #00ff88;
      }
      .rc-status.fail {
        color: #ff3c5a;
      }
      .rc-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        background: #0a1420;
        border: 1px solid #00e5ff;
        color: #00e5ff;
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 13px;
      }

      /* ── Wallet bar (persistent, every screen) ─────────────────────────── */
      #wallet-bar {
        position: fixed;
        top: 12px;
        right: 16px;
        z-index: 30;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .wb-name {
        color: #00e5ff;
        font-size: 13px;
        font-weight: bold;
        text-shadow: 0 0 6px rgba(0, 229, 255, 0.5);
      }
      .wb-btn {
        background: #0a1420;
        color: #00e5ff;
        border: 1px solid #00e5ff;
        padding: 7px 14px;
        border-radius: 8px;
        font-family: monospace;
        font-size: 13px;
        cursor: pointer;
      }
      .wb-btn:hover {
        background: #0e1d2e;
      }
      .wb-btn:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .wb-connect {
        box-shadow: 0 0 14px rgba(0, 229, 255, 0.35);
      }
      .wb-tagline {
        color: #9fb4c8;
        font-size: 12px;
        margin-right: 4px;
      }
      .ride-hint {
        margin-top: 10px;
        color: #ffd27a;
        font-size: 13px;
        letter-spacing: 0.5px;
      }
      .ride-hint:empty {
        display: none;
      }
      .modal-switch {
        margin-top: 14px;
        font-size: 12px;
        color: #9fb4c8;
      }
      .modal-switch a {
        color: #00e5ff;
        cursor: pointer;
        text-decoration: underline;
      }

      /* ── Modal (username) ──────────────────────────────────────────────── */
      .modal {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(5, 6, 10, 0.8);
      }
      .modal-card {
        background: #0a1420;
        border: 1px solid #00e5ff;
        border-radius: 12px;
        padding: 24px 26px;
        width: 320px;
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.25);
        text-align: center;
      }
      .modal-title {
        color: #00e5ff;
        font-weight: bold;
        letter-spacing: 2px;
        margin-bottom: 6px;
      }
      .modal-sub {
        color: #9fb4c8;
        font-size: 12px;
        margin-bottom: 16px;
      }
      .modal-input {
        width: 100%;
        box-sizing: border-box;
        background: #05060a;
        border: 1px solid #1d3b4d;
        color: #e0ffff;
        font-family: monospace;
        font-size: 15px;
        padding: 10px 12px;
        border-radius: 8px;
        outline: none;
      }
      .modal-input:focus {
        border-color: #00e5ff;
      }
      .modal-error {
        color: #ff3c5a;
        font-size: 12px;
        min-height: 16px;
        margin: 8px 0;
      }
      .modal-buttons {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      .btn-primary {
        background: linear-gradient(180deg, #00e5ff, #00a6bd);
        color: #05060a;
        border: none;
        padding: 8px 18px;
        border-radius: 8px;
        font-family: monospace;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-primary:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .wallet-review {
        background: #05060a;
        border: 1px solid #00e5ff;
        border-radius: 8px;
        padding: 12px;
        margin: 4px 0 12px;
        font-size: 15px;
        font-weight: bold;
        color: #00e5ff;
        word-break: break-all;
        line-height: 1.4;
        text-shadow: 0 0 6px rgba(0, 229, 255, 0.4);
      }
      .modal-warning {
        color: #ffd27a;
        background: rgba(255, 170, 0, 0.08);
        border: 1px solid rgba(255, 170, 0, 0.4);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 12px;
        line-height: 1.5;
        text-align: left;
        margin-bottom: 12px;
      }
      .modal-check {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: #e0ffff;
        margin-bottom: 4px;
        cursor: pointer;
        text-align: left;
      }
      .modal-check input {
        accent-color: #00e5ff;
        width: 16px;
        height: 16px;
      }

      /* ── Payout board (Home centrepiece) ───────────────────────────────── */
      .board-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .board-head .countdown {
        color: #9fb4c8;
        font-size: 12px;
        letter-spacing: 1px;
      }
      .board-head .cd-time {
        color: #00e5ff;
        font-weight: bold;
        font-size: 16px;
      }
      .payout-board {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 8px;
      }
      .pb-row {
        display: grid;
        grid-template-columns: 44px 1fr auto minmax(0, 38%);
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        border: 1px solid rgba(91, 113, 132, 0.18);
        border-radius: 8px;
        background: rgba(10, 20, 32, 0.5);
        color: #e0ffff;
        text-decoration: none;
        font-size: 13px;
      }
      .pb-row:hover {
        border-color: #00e5ff;
      }
      .pb-rank {
        color: #5b7184;
        font-weight: bold;
      }
      .pb-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pb-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 7px;
        vertical-align: middle;
      }
      .pb-prize {
        color: #ffb000;
        font-weight: bold;
        white-space: nowrap;
      }
      .pb-leadwrap {
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pb-leader {
